<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallet Connect Deep Link</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #f5f5f5;
        }
        .container {
            background: #fff;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            text-align: center;
        }
        .qr {
            margin: 1.5rem 0;
        }

        /* Add QR/Deep Link styles for mobile */
        @media (max-width: 600px) {
            .desktop-link {
                display: none !important;
            }
            .mobile-link, .qr {
                display: block !important;
            }
        }
        @media (min-width: 601px) {
            .mobile-link, .qr {
                display: none !important;
            }
            .desktop-link {
                display: block !important;
            }
        }
        @media (max-width: 600px) {
            .desktop-link {
                display: none;
            }
            .mobile-link, .qr {
                display: block;
            }
        }
        @media (min-width: 601px) {
            .mobile-link, .qr {
                display: none;
            }
            .desktop-link {
                display: block;
            }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/qrious@4.0.2/dist/qrious.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>Connect Your Wallet</h1>
        <strong>💰 Crypto Only!</strong>
        <p>We now accept cryptocurrency payments exclusively. Connect your wallet to book flights.</p>
        <button id="connect-wallet-btn" style="margin-top:1.5rem; padding:1rem 2rem; font-size:1.1rem; background:#1976d2; color:#fff; border:none; border-radius:8px; cursor:pointer;">Connect Wallet</button>
        <div id="wallet-status" style="margin-top:1rem; font-size:1rem;"></div>

        <script src="https://cdn.jsdelivr.net/npm/qrious@4.0.2/dist/qrious.min.js"></script>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@walletconnect/web3-provider@1.8.0/dist/umd/index.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/web3@1.10.0/dist/web3.min.js"></script>
    <script>
        let web3;
        let provider;
        let walletAddress = null;

        async function connectWallet() {
            const statusDiv = document.getElementById('wallet-status');
            statusDiv.textContent = '';
            // Try MetaMask first
            if (window.ethereum) {
                try {
                    provider = window.ethereum;
                    await provider.request({ method: 'eth_requestAccounts' });
                    web3 = new Web3(provider);
                    const accounts = await web3.eth.getAccounts();
                    walletAddress = accounts[0];
                    statusDiv.textContent = 'Connected: ' + walletAddress;
                } catch (err) {
                    statusDiv.textContent = 'MetaMask connection failed: ' + err.message;
                }
            } else {
                // Fallback to WalletConnect
                try {
                    provider = new window.WalletConnectProvider.default({
                        infuraId: '8043bb2cf316cb6b519b6724a4ce1d86'
                    });
                    await provider.enable();
                    web3 = new Web3(provider);
                    const accounts = await web3.eth.getAccounts();
                    walletAddress = accounts[0];
                    statusDiv.textContent = 'Connected (WalletConnect): ' + walletAddress;
                } catch (err) {
                    statusDiv.textContent = 'WalletConnect failed: ' + err.message;
                }
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('connect-wallet-btn').addEventListener('click', connectWallet);
        });
        function isMobile() {
            return window.innerWidth <= 600;
        }
        function showQR() {
            if (isMobile()) {
                var qr = new QRious({
                    element: document.getElementById('qr'),
                    value: 'wc://deep-link-example',
                    size: 200
                });
            }
        }
        window.addEventListener('DOMContentLoaded', showQR);
        window.addEventListener('resize', function() {
            document.getElementById('qr').style.display = isMobile() ? 'block' : 'none';
        });
    </script>
</body>
</html>
