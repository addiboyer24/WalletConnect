<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallet Connect Deep Link</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #f5f5f5;
        }
        .container {
            background: #fff;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            text-align: center;
        }
        .qr {
            margin: 1.5rem 0;
        }

        /* Add QR/Deep Link styles for mobile */
        @media (max-width: 600px) {
            .desktop-link {
                display: none !important;
            }
            .mobile-link, .qr {
                display: block !important;
            }
        }
        @media (min-width: 601px) {
            .mobile-link, .qr {
                display: none !important;
            }
            .desktop-link {
                display: block !important;
            }
        }
        @media (max-width: 600px) {
            .desktop-link {
                display: none;
            }
            .mobile-link, .qr {
                display: block;
            }
        }
        @media (min-width: 601px) {
            .mobile-link, .qr {
                display: none;
            }
            .desktop-link {
                display: block;
            }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/qrious@4.0.2/dist/qrious.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>Connect Your Wallet</h1>
        <strong data-en="💰 Crypto Only!" data-it="💰 Solo Cripto!">💰 Crypto Only!</strong>
        <p data-en="We now accept cryptocurrency payments exclusively. Connect your wallet to book flights." data-it="Ora accettiamo pagamenti in criptovaluta esclusivamente. Connetti il tuo portafoglio per prenotare i voli.">We now accept cryptocurrency payments exclusively. Connect your wallet to book flights.</p>
        <!-- WalletConnect Deep Link/QR for Mobile -->
        <div style="margin-top:1.5rem;">
            <a class="desktop-link btn btn-secondary" href="https://walletconnect.com/" target="_blank" style="margin-bottom:0.5rem;">Connect with WalletConnect (Desktop)</a>
            <a class="mobile-link btn btn-primary" href="wc://deep-link-example" style="font-size:1.1rem; color:#1976d2; margin-bottom:0.5rem;">Open in Wallet App (Mobile)</a>
            <canvas id="qr" class="qr" style="margin:0.5rem auto; display:none;"></canvas>
            <p class="mobile-link" style="font-size:0.95rem; margin:0.5rem 0 0 0;">Scan this QR code with your wallet app:</p>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/qrious@4.0.2/dist/qrious.min.js"></script>
    </div>
    <script>
        // WalletConnect QR/Deep Link for Mobile
        function isMobileWalletView() {
            return window.innerWidth <= 600;
        }
        function showWalletConnectQR() {
            var qrCanvas = document.getElementById('qr');
            if (!qrCanvas) return;
            if (isMobileWalletView()) {
                qrCanvas.style.display = 'block';
                new QRious({
                    element: qrCanvas,
                    value: 'wc://deep-link-example',
                    size: 200
                });
            } else {
                qrCanvas.style.display = 'none';
            }
        }
        window.addEventListener('DOMContentLoaded', showWalletConnectQR);
        window.addEventListener('resize', showWalletConnectQR);

        // Wallet State with WalletConnect
        function isMobile() {
            return window.innerWidth <= 600;
        }
        function showQR() {
            if (isMobile()) {
                var qr = new QRious({
                    element: document.getElementById('qr'),
                    value: 'wc://deep-link-example',
                    size: 200
                });
            }
        }
        window.addEventListener('DOMContentLoaded', showQR);
        window.addEventListener('resize', function() {
            document.getElementById('qr').style.display = isMobile() ? 'block' : 'none';
        });
    </script>
</body>
</html>
