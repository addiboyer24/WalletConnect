<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallet Connect Deep Link</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #f5f5f5;
        }
        .container {

            <!DOCTYPE html>
            <html lang="en">
            <head>
                <meta charset="UTF-8">
                <meta name="viewport" content="width=device-width, initial-scale=1.0">
                <title>Modern Wallet Payment Connection</title>
                <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
                <style>
                    body {
                        font-family: 'Segoe UI', Arial, sans-serif;
                        background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
                        min-height: 100vh;
                        margin: 0;
                        display: flex;
                        align-items: center;
                        justify-content: center;
                    }
                    .app-container {
                        background: #fff;
                        border-radius: 16px;
                        box-shadow: 0 8px 32px rgba(0,0,0,0.12);
                        padding: 2.5rem 2rem;
                        max-width: 400px;
                        width: 100%;
                        text-align: center;
                    }
                    .wallet-status {
                        margin: 1.5rem 0 1rem 0;
                        font-size: 1.1rem;
                        font-weight: 500;
                        color: #1976d2;
                        word-break: break-all;
                    }
                    .wallet-address {
                        background: #f0f4f8;
                        border-radius: 8px;
                        padding: 0.75rem 1rem;
                        font-family: 'Fira Mono', monospace;
                        font-size: 1rem;
                        color: #333;
                        margin-bottom: 1.5rem;
                        word-break: break-all;
                    }
                    .connect-btn {
                        background: #1976d2;
                        color: #fff;
                        border: none;
                        border-radius: 8px;
                        padding: 1rem 2rem;
                        font-size: 1.1rem;
                        font-weight: 600;
                        cursor: pointer;
                        transition: background 0.2s;
                        margin-bottom: 1rem;
                    }
                    .connect-btn:hover {
                        background: #1251a3;
                    }
                    .wallet-icon {
                        font-size: 2.5rem;
                        margin-bottom: 1rem;
                        color: #1976d2;
                    }
                    .error {
                        color: #dc2626;
                        margin-top: 1rem;
                        font-size: 1rem;
                    }
                    .success {
                        color: #10b981;
                        margin-top: 1rem;
                        font-size: 1rem;
                    }
                </style>
            </head>
            <body>
                <div class="app-container">
                    <div class="wallet-icon"><i class="fa-brands fa-ethereum"></i></div>
                    <h2>Connect Your Wallet</h2>
                    <div id="wallet-status" class="wallet-status">Connecting...</div>
                    <div id="wallet-address" class="wallet-address" style="display:none;"></div>
                    <button id="connect-btn" class="connect-btn" style="display:none;">Connect Wallet</button>
                    <div id="error-message" class="error"></div>
                    <div id="success-message" class="success"></div>
                </div>
                <script src="https://cdn.jsdelivr.net/npm/@walletconnect/web3-provider@1.8.0/dist/umd/index.min.js"></script>
                <script src="https://cdn.jsdelivr.net/npm/web3@1.10.0/dist/web3.min.js"></script>
                <script>
                    let web3;
                    let provider;
                    let walletAddress = null;
                    const walletStatus = document.getElementById('wallet-status');
                    const walletAddressDiv = document.getElementById('wallet-address');
                    const connectBtn = document.getElementById('connect-btn');
                    const errorDiv = document.getElementById('error-message');
                    const successDiv = document.getElementById('success-message');

                    async function tryConnectWallet(auto = false) {
                        errorDiv.textContent = '';
                        successDiv.textContent = '';
                        walletStatus.textContent = auto ? 'Connecting...' : '';
                        walletStatus.style.color = '#1976d2';
                        connectBtn.style.display = 'none';
                        walletAddressDiv.style.display = 'none';
                        // Try MetaMask/Uniswap (EIP-1193)
                        if (window.ethereum) {
                            try {
                                provider = window.ethereum;
                                await provider.request({ method: 'eth_requestAccounts' });
                                web3 = new Web3(provider);
                                const accounts = await web3.eth.getAccounts();
                                walletAddress = accounts[0];
                                walletStatus.textContent = 'Wallet Connected!';
                                walletStatus.style.color = '#10b981';
                                walletAddressDiv.textContent = walletAddress;
                                walletAddressDiv.style.display = 'block';
                                successDiv.textContent = 'You are connected to ' + (provider.isMetaMask ? 'MetaMask' : provider.isUniswap ? 'Uniswap Wallet' : 'your wallet') + '.';
                                return;
                            } catch (err) {
                                errorDiv.textContent = 'Connection failed: ' + err.message;
                                walletStatus.textContent = 'Not connected';
                                walletStatus.style.color = '#dc2626';
                                connectBtn.style.display = 'inline-block';
                            }
                        } else {
                            // Fallback to WalletConnect
                            try {
                                provider = new window.WalletConnectProvider.default({
                                    infuraId: '8043bb2cf316cb6b519b6724a4ce1d86'
                                });
                                await provider.enable();
                                web3 = new Web3(provider);
                                const accounts = await web3.eth.getAccounts();
                                walletAddress = accounts[0];
                                walletStatus.textContent = 'Wallet Connected!';
                                walletStatus.style.color = '#10b981';
                                walletAddressDiv.textContent = walletAddress;
                                walletAddressDiv.style.display = 'block';
                                successDiv.textContent = 'You are connected via WalletConnect.';
                                return;
                            } catch (err) {
                                errorDiv.textContent = 'No wallet found. Please install MetaMask, Uniswap, or use WalletConnect.';
                                walletStatus.textContent = 'Not connected';
                                walletStatus.style.color = '#dc2626';
                                connectBtn.style.display = 'inline-block';
                            }
                        }
                    }

                    // Try to connect on load
                    window.addEventListener('DOMContentLoaded', function() {
                        tryConnectWallet(true);
                        connectBtn.addEventListener('click', function() {
                            tryConnectWallet(false);
                        });
                    });
                </script>
            </body>
            </html>
</body>
</html>
